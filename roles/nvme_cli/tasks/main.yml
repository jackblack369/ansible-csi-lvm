---
- name: Install nvme-cli
  apt:
    name: "{{ nvme_cli_packages }}"
    state: present
    update_cache: yes
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Try to load nvme_tcp
  command: modprobe nvme_tcp
  register: modprobe_nvme_tcp
  changed_when: false
  failed_when: false

- name: Install linux-modules-extra for running kernel if nvme_tcp missing
  apt:
    name: "linux-modules-extra-{{ ansible_kernel }}"
    state: present
    update_cache: yes
  environment:
    DEBIAN_FRONTEND: noninteractive
  when: modprobe_nvme_tcp.rc != 0

- name: Load nvme_tcp module
  community.general.modprobe:
    name: nvme_tcp
    state: present

- name: Load nvme_fabrics module
  community.general.modprobe:
    name: nvme_fabrics
    state: present
